name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

# ────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Backend: lint + type-check ─────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint dependencies
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ── Backend: unit tests ────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intervai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest (unit tests only)
        env:
          PYTHONPATH: .
          ENVIRONMENT: development
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/intervai_test
          REDIS_URL: redis://localhost:6379/15
          CELERY_BROKER_URL: redis://localhost:6379/15
          CELERY_RESULT_BACKEND: redis://localhost:6379/15
          CLERK_JWT_ISSUER: https://test.clerk.accounts.dev
          CLERK_SECRET_KEY: sk_test_fake_key_for_ci
          BACKGROUND_JOBS_ENABLED: "false"
          ORCHESTRATION_ENABLED: "false"
          RESUME_ANALYSIS_HEURISTIC_ONLY: "true"
          INTERVIEW_QUESTIONS_HEURISTIC_ONLY: "true"
          ANSWER_EVALUATION_HEURISTIC_ONLY: "true"
          SENTRY_DSN: ""
        run: pytest -m "unit" --cov=app --cov-report=xml --no-header -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ── Frontend: lint ─────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

  # ── Frontend: type-check + tests ───────────────────────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Jest unit tests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: frontend/coverage/lcov.info
          flags: frontend
        continue-on-error: true

  # ── Docker build check ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.prod.Dockerfile
          push: false
          tags: intervai-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.prod.Dockerfile
          push: false
          tags: intervai-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.intervai.app
          cache-from: type=gha
          cache-to: type=gha,mode=max
