# Render deployment config for IntervAI
# https://render.com/docs/blueprint-spec
# Deploy: connect GitHub repo at render.com, then "Deploy Blueprint"

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: intervai-backend
    runtime: docker
    dockerfilePath: ./docker/backend.prod.Dockerfile
    dockerContext: .
    plan: starter  # upgrade to standard for production
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_JSON
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: intervai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: intervai-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: intervai-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: intervai-redis
          type: redis
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false   # set manually in Render dashboard
      - key: CLERK_JWT_ISSUER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: intervai-celery
    runtime: docker
    dockerfilePath: ./docker/backend.prod.Dockerfile
    dockerContext: .
    startCommand: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      -Q default,resume,interview,ai
      --concurrency=2
    plan: starter
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: intervai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: intervai-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: intervai-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: intervai-redis
          type: redis
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_JWT_ISSUER
        sync: false

databases:
  - name: intervai-db
    plan: starter
    databaseName: intervai
    postgresMajorVersion: 16
